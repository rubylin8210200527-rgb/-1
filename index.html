    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --primary: #1e3a8a; --accent: #f59e0b; --bg: #f1f5f9; }
        body { font-family: "Microsoft JhengHei", sans-serif; background: #cbd5e1; margin: 0; padding-bottom: 110px; color: #334155; }
        .container { width: 100%; max-width: 500px; background: white; min-height: 100vh; margin: auto; position: relative; box-shadow: 0 0 20px rgba(0,0,0,0.2); }
        .header { background: linear-gradient(135deg, #1e3a8a 0%, #2563eb 100%); color: white; padding: 25px 20px; text-align: center; }
        .header h1 { margin: 0; font-size: 22px; letter-spacing: 1px; }

        /* 🔴 懸浮紅球 */
        .floating-promo {

            background: radial-gradient(circle at 30% 30%, #ff4d4d, #b30000);
            border-radius: 50%; color: white; display: flex; flex-direction: column; 
            align-items: center; justify-content: center; text-align: center; 
            box-shadow: 0 5px 15px rgba(255,0,0,0.5); border: 2px solid white; z-index: 2000;
            animation: bounce 1.2s infinite alternate ease-in-out; cursor: pointer;
        }
        @keyframes bounce { from { transform: translateY(0); } to { transform: translateY(-15px); } }

        /* 🖼️ LINE 彈出視窗 */
        #qr-modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); z-index: 3000; align-items: center; justify-content: center; }
        .modal-content { background: white; padding: 25px; border-radius: 20px; text-align: center; width: 80%; max-width: 300px; position: relative; }
        .modal-content img { width: 100%; height: auto; margin: 15px 0; border-radius: 8px; }
        .close-btn { position: absolute; top: -10px; right: -10px; background: #ff4d4d; color: white; width: 35px; height: 35px; border-radius: 50%; border: none; font-weight: bold; cursor: pointer; }

        /* 篩選與內容 */
        .filter-box { padding: 15px; background: #f8fafc; border-bottom: 1px solid #e2e8f0; }
        select { width: 100%; padding: 12px; border-radius: 10px; border: 2px solid #cbd5e1; font-size: 16px; font-weight: bold; color: var(--primary); outline: none; }
        .tabs { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; padding: 15px; background: #fff; }
        .tab-btn { padding: 10px; background: #f1f5f9; border-radius: 8px; border: 1px solid #e2e8f0; font-weight: bold; cursor: pointer; text-align: center; font-size: 14px; color: #64748b; }
        .tab-btn.active { background: var(--primary); color: white; border-color: var(--primary); box-shadow: 0 4px 10px rgba(30,58,138,0.3); }
        .content { padding: 0 20px 20px; }
        .label { font-weight: bold; color: var(--primary); border-left: 5px solid var(--primary); padding-left: 10px; margin: 25px 0 10px; display: block; font-size: 16px; }
        .box { background: #f8fafc; padding: 15px; border-radius: 12px; font-size: 14px; line-height: 1.7; border: 1px solid #e2e8f0; white-space: pre-line; color: #475569; }
        .img-container { width: 100%; height: 260px; border-radius: 15px; overflow: hidden; background: #000; margin-bottom: 10px; }
        .img-container img { width: 100%; height: 100%; object-fit: cover; }

        /* 底部導航 */
        .quick-action-bar { position: fixed; bottom: 0; left: 50%; transform: translateX(-50%); width: 100%; max-width: 500px; background: white; display: flex; justify-content: space-around; align-items: flex-end; padding: 10px 0 25px 0; box-shadow: 0 -5px 15px rgba(0,0,0,0.1); z-index: 1000; }
        .action-item { text-decoration: none; display: flex; flex-direction: column; align-items: center; gap: 5px; flex: 1; color: #475569; cursor: pointer; }
        .action-icon { width: 45px; height: 45px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 20px; color: white; }
        .bg-blue { background: #2563eb; } .bg-green { background: #22c55e; } .bg-red { background: #ef4444; }
        .main-icon { width: 60px !important; height: 60px !important; font-size: 30px !important; margin-top: -20px; border: 5px solid white; box-shadow: 0 4px 15px rgba(0,0,0,0.2); }
    </style>
</head>
<body>

<div id="qr-modal" onclick="closeQR()">

    </div>

    <div class="quick-action-bar">
        <a href="https://line.me/R/oaMessage/@071yewow/?%E8%AB%8B%E7%99%BC%E9%80%81%E8%A8%8A%E6%81%AF%E5%AE%8C%E6%88%90%E6%8C%87%E6%B4%BE:%20assignToAgent._V0P1dV" target="_blank" class="action-item">
            <div class="action-icon bg-blue"><i class="fas fa-comment-dots"></i></div>

        </a>
        <div class="action-item" onclick="openQR()">

</div>

    // 這裡放入你之前貼給我的那段超長 dataList 分校資料 (16間分校)
    const dataList = [

        {"區域":"北區","分校":"館前","地址":"臺北市館前路2號5樓","教室照片1":"https://i.postimg.cc/kgKMDzpk/0201.jpg","注意事項":"‧請維護清潔並輕聲細語。","地圖":"https://i.postimg.cc/wjpM59LM/de-tu.jpg","交通":"捷運『台北車站』Z6出口，國泰世華旁電梯"},
        {"區域":"北區","分校":"板橋","地址":"新北市板橋區府中路29-1號6樓","教室照片1":"https://i.postimg.cc/7h9TqbGB/0201.jpg","注意事項":"‧專業教室請愛惜使用。","地圖":"https://i.postimg.cc/RZyJSkF2/de-tu.jpg","交通":"捷運府中站1號出口"},
        {"區域":"北區","分校":"永和","地址":"新北市永和區永和路二段59號4樓","教室照片1":"https://i.postimg.cc/mgH2wtLX/3602-yong-he-fen-xiao.jpg","注意事項":"‧請維護環境清潔。","地圖":"https://i.postimg.cc/9XgmHGr4/de-tu.jpg","交通":"捷運頂溪站1號出口步行約150公尺"},
        {"區域":"北區","分校":"桃園","地址":"桃園市桃園區大同路11號4樓","教室照片1":"https://i.postimg.cc/sDRrrw3f/0701.jpg","注意事項":"‧專業培訓空間，請輕聲細語。","地圖":"https://i.postimg.cc/vmDRzKtv/1770602734023.jpg","交通":"桃園火車站出站往左"},
        {"區域":"北區","分校":"中壢","地址":"桃園市中壢區中正路183號1-3樓","教室照片1":"https://i.postimg.cc/4xLqm5RH/1101.png","注意事項":"‧請愛惜使用電腦設備。","地圖":"https://i.postimg.cc/vZN2QZ51/de-tu.jpg","交通":"中壢火車站前"},
        {"區域":"北區","分校":"新竹","地址":"新竹市中華路二段318號1-3樓","教室照片1":"https://i.postimg.cc/y8gXyXSz/1402-02.jpg","注意事項":"‧專業培訓空間。","地圖":"https://i.postimg.cc/KjpBnRGP/de-tu.jpg","交通":"新竹火車站右轉"},
        {"區域":"中區","分校":"三民","地址":"臺中市北區三民路三段112號5樓","教室照片1":"https://i.postimg.cc/Z5wDs4Kd/0802.jpg","注意事項":"‧請維護環境清潔。","地圖":"https://i.postimg.cc/FKQ1q5Wm/de-tu.jpg","交通":"台中科技大學正對面"},
        {"區域":"中區","分校":"彰化","地址":"彰化縣彰化市中正路一段544號","教室照片1":"https://i.postimg.cc/x1MNdszs/1521.jpg","注意事項":"‧請勿大聲喧嘩。","地圖":"https://i.postimg.cc/mDXtnJ0v/1770603513455.jpg","交通":"彰化火車站前步行2分鐘"},
        {"區域":"中區","分校":"台中站前","地址":"台中市中區建國路123號3樓","教室照片1":"https://i.postimg.cc/5yJpyHPr/1902.jpg","注意事項":"‧請愛惜公物。","地圖":"https://i.postimg.cc/hvKbgkj3/de-tu.jpg","交通":"舊台中火車站前站"},
        {"區域":"中區","分校":"豐原","地址":"臺中市豐原區中正路116號1-3樓","教室照片1":"https://i.postimg.cc/zvLDLBVf/3501-01.jpg","注意事項":"‧維護環境整潔。","地圖":"https://i.postimg.cc/cHPCBwqt/1770606137746.jpg","交通":"豐原火車站出站左方150公尺"},
        {"區域":"南區","分校":"台南","地址":"臺南市成功路57號","教室照片1":"https://i.postimg.cc/wT1vbWxh/1001.jpg","注意事項":"‧請維持清潔。","地圖":"https://i.postimg.cc/JhMRmKmL/1770608257388.jpg","交通":"台南火車站前成功路"},
        {"區域":"南區","分校":"嘉義","地址":"嘉義市中正路709號","教室照片1":"https://i.postimg.cc/T3TXs6b1/1601.jpg","注意事項":"‧請維持安靜。","地圖":"https://i.postimg.cc/15QxgQJw/1770614892797.jpg","交通":"嘉義火車站右前方"},
        {"區域":"南區","分校":"鳳山","地址":"高雄市鳳山區光遠路181號","教室照片1":"https://i.postimg.cc/63frYCxr/1201.jpg","注意事項":"‧請勿喧嘩。","地圖":"https://i.postimg.cc/JnMJDtHh/de-tu.jpg","交通":"大東捷運站2號出口"},
        {"區域":"南區","分校":"高雄","地址":"高雄市中山一路243號","教室照片1":"https://i.postimg.cc/VvbYzWs0/902.jpg","注意事項":"‧請保持環境衛生。","地圖":"https://i.postimg.cc/g2p6Bn4B/de-tu.jpg","交通":"美麗島站11號出口"},
        {"區域":"南區","分校":"屏東","地址":"屏東縣屏東市中山路25號","教室照片1":"https://i.postimg.cc/261CFb9L/1301.jpg","注意事項":"‧請愛惜電腦設備。","地圖":"https://i.postimg.cc/BnJs7wwq/1770625570590.jpg","交通":"屏東火車站步行10分鐘"}
    ];

    function openQR() { document.getElementById('qr-modal').style.display = 'flex'; }
    function closeQR() { document.getElementById('qr-modal').style.display = 'none'; }
    function init() {
        const regions = [...new Set(dataList.map(d => d["區域"]))];
        document.getElementById('region-sel').innerHTML = regions.map(r => `<option value="${r}">${r}</option>`).join('');
        changeRegion();
    }
    function changeRegion() {
        const r = document.getElementById('region-sel').value;
        const filtered = dataList.filter(d => d["區域"] === r);
        document.getElementById('tab-list').innerHTML = filtered.map((d, i) => 
            `<div class="tab-btn ${i===0?'active':''}" onclick="selectTab(this, '${d["分校"]}')">${d["分校"]}</div>`
        ).join('');
        showInfo(filtered[0]);
    }
    function selectTab(el, name) {
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        el.classList.add('active');
        showInfo(dataList.find(d => d["分校"] === name));
    }
    function showInfo(item) {
        if(!item) return;
        document.getElementById('display').innerHTML = `
            <div class="img-container"><img src="${item["教室照片1"]}"></div>
            <div class="content">
                <span class="label">📍 ${item["分校"]} 分校地址</span>
                <div class="box" style="background:#fffbeb; font-weight:bold; color:#b45309;">${item["地址"]}</div>
                <span class="label">🚌 交通指南</span>
                <div class="box" style="background:#f0f9ff;">${item["交通"]}</div>
                <span class="label">⚠️ 注意事項</span>
                <div class="box" style="color:#ef4444; background:#fef2f2;">${item["注意事項"]}</div>
                <span class="label">🗺️ 地圖導航</span>
                <div style="margin-top:10px; border-radius:12px; overflow:hidden; border:2px solid #ddd; cursor:pointer;" onclick="window.open('https://www.google.com/maps/search/?api=1&query=${encodeURIComponent("聯成電腦"+item["分校"])}', '_blank')">
                    <img src="${item["地圖"]}" style="width:100%; display:block;">
                </div>
            </div>`;
    }
    init();
</script>
</body>
</html>
